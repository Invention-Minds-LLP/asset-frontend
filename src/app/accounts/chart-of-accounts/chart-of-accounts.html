<div class="coa-container">
  <p-toast />
  <div class="page-header">
    <div>
      <h2>Chart of Accounts</h2>
      <p class="subtitle">Manage account hierarchy for double-entry bookkeeping</p>
    </div>
    <p-button label="New Account" icon="pi pi-plus" (onClick)="openNew()" />
  </div>
  <div class="divider-container"><hr class="divider" /></div>

  <p-table [value]="accounts" [loading]="loading" [paginator]="true" [rows]="20"
    styleClass="p-datatable-sm p-datatable-striped" [globalFilterFields]="['code','name','type']">
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="code">Code <p-sortIcon field="code" /></th>
        <th pSortableColumn="name">Name <p-sortIcon field="name" /></th>
        <th>Type</th>
        <th>Sub-Type</th>
        <th>Parent</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td><strong>{{ row.code }}</strong></td>
        <td>{{ row.name }}</td>
        <td><p-tag [value]="row.type" [severity]="getTypeSeverity(row.type)" /></td>
        <td>{{ row.subType || '-' }}</td>
        <td>{{ row.parent?.name || '-' }}</td>
        <td>
          <p-tag [value]="row.isActive ? 'Active' : 'Inactive'"
            [severity]="row.isActive ? 'success' : 'secondary'" />
        </td>
        <td>
          <p-button icon="pi pi-pencil" [text]="true" size="small" (onClick)="openEdit(row)" />
          <p-button icon="pi pi-ban" [text]="true" size="small" severity="danger"
            *ngIf="row.isActive" (onClick)="deactivate(row)" />
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr><td colspan="7" class="empty-msg">No accounts found. Add your first account.</td></tr>
    </ng-template>
  </p-table>

  <!-- Create / Edit Dialog -->
  <p-dialog [(visible)]="showDialog" [header]="isEdit ? 'Edit Account' : 'New Account'"
    [modal]="true" [style]="{width:'480px'}" [closable]="true">
    <div class="dialog-form">
      <p-floatlabel variant="on" class="full-field">
        <input pInputText name="code" [(ngModel)]="form.code" [disabled]="isEdit" />
        <label>Account Code *</label>
      </p-floatlabel>

      <p-floatlabel variant="on" class="full-field">
        <input pInputText name="name" [(ngModel)]="form.name" />
        <label>Account Name *</label>
      </p-floatlabel>

      <p-floatlabel variant="on" class="full-field">
        <p-select [options]="accountTypes" optionLabel="label" optionValue="value"
          [(ngModel)]="form.type" appendTo="body" [disabled]="isEdit" />
        <label>Type *</label>
      </p-floatlabel>

      <p-floatlabel variant="on" class="full-field">
        <input pInputText name="subType" [(ngModel)]="form.subType" />
        <label>Sub-Type</label>
      </p-floatlabel>

      <p-floatlabel variant="on" class="full-field">
        <p-select [options]="accounts" optionLabel="name" optionValue="id"
          [(ngModel)]="form.parentId" appendTo="body" [showClear]="true" placeholder="None (root account)" />
        <label>Parent Account</label>
      </p-floatlabel>

      <p-floatlabel variant="on" class="full-field">
        <input pInputText name="description" [(ngModel)]="form.description" />
        <label>Description</label>
      </p-floatlabel>
    </div>
    <ng-template pTemplate="footer">
      <p-button label="Cancel" [text]="true" (onClick)="showDialog=false" />
      <p-button label="Save" icon="pi pi-check" (onClick)="save()" />
    </ng-template>
  </p-dialog>
</div>
