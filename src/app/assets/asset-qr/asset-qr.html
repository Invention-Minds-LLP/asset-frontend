<div class="qr-card">
  <h3>Asset QR Code</h3>

  <p><strong>Asset:</strong> {{ assetName || '-' }}</p>
  <p><strong>Asset ID:</strong> {{ assetId }}</p>

  <div *ngIf="qrValue">
    <div class="qr-wrapper">
      <qrcode
        [qrdata]="qrValue"
        [width]="220"
        [errorCorrectionLevel]="'H'"
        [elementType]="'canvas'"
        [imageSrc]="'/sa_logo.png'"
        [imageHeight]="44"
        [imageWidth]="44">
      </qrcode>
    </div>
  </div>

  <p class="scan-url">{{ qrValue }}</p>

  <div class="actions">
    <button type="button" (click)="downloadQr()">Download</button>
    <button type="button" (click)="printQr()">Print</button>
  </div>
</div>
